server:
  port: 8080 # 网关端口

spring:
  profiles:
    active: dev
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8099 # Sentinel 控制台地址
        port: 8721 # Sentinel 通信端口
      eager: true # 懒加载 Sentinel
      datasource:
        gw-flow:
          file:
            file: classpath:sentinel/gw-flow-rules.json
            rule-type: gw-flow # 限流规则
        degrade:
          file:
            file: classpath:sentinel/degrade-rules.json
            rule-type: degrade # 降级规则

    gateway:
      rate-limit:
        trust-proxy-headers: false   # 无代理环境设为 false，有 Nginx 时改为 true
      # 全局跨域配置 (替代原 WebMvcConfiguration 中的 CORS)
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*" # 允许所有来源
            allowedMethods: "*"        # 允许所有请求方法
            allowedHeaders: "*"        # 允许所有请求头
            allowCredentials: true     # 允许发送 Cookie
            maxAge: 3600               # 预检请求的缓存时间 (秒)
      routes:
        # 菜品查询路由 (白名单/公共接口)
        - id: dish-query-route
          uri: http://localhost:8081
          predicates:
            - Path=/user/dish/list
            - Method=GET
          filters:
            - name: RequestRateLimiter
              args:
                # 参数 replenishRate=20 + burstCapacity=50 允许每秒最多20次请求，但可容忍短时50次突发（例如瞬间点击），超过则返回 HTTP 429。
                # 公共接口阈值放宽，主要防恶意爬虫和 DDoS
                redis-rate-limiter.replenishRate: 20  # 单 IP 每秒允许 20 次
                redis-rate-limiter.burstCapacity: 50 # 单 IP 最大突发 50 次
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@authKeyResolver}"   # 自动走 IP 降级逻辑
        # 秒杀接口专属路由
        - id: seckill-post-route
          uri: http://localhost:8081
          predicates:
            - Path=/user/coupon/seckill
            - Method=POST
          filters:
            # 核心：接入 Redis 令牌桶限流过滤器
            - name: RequestRateLimiter
              args:
                # 参数 replenishRate=10 + burstCapacity=20 表示：
                # 允许每秒最多10次请求，但可容忍短时20次突发（例如瞬间点击），超过则返回 HTTP 429。
                redis-rate-limiter.replenishRate: 10  # 令牌桶每秒填充速率 (QPS)
                redis-rate-limiter.burstCapacity: 20  # 令牌桶总容量 (最大并发)
                redis-rate-limiter.requestedTokens: 1 # 每次请求消耗的令牌数
                key-resolver: "#{@authKeyResolver}"   # 自定义限流维度
        # 下单接口专属路由
        - id: order-submit-route
          uri: http://localhost:8081
          predicates:
            - Path=/user/order/submit
          filters:
            - name: RequestRateLimiter
              args:
                # 允许每秒最多5次请求，但可容忍短时10次突发（例如瞬间点击），超过则返回 HTTP 429。
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@authKeyResolver}"
        # 查询用户地址簿接口专属路由
        - id: addressBook-list-route
          uri: http://localhost:8081
          predicates:
            - Path=/user/addressBook/list
          filters:
            - name: RequestRateLimiter
              args:
                # 允许每秒最多10次请求，但可容忍短时20次突发（例如瞬间点击），超过则返回 HTTP 429。
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@authKeyResolver}"
        # 用户登录接口专属路由
        - id: user-login-route
          uri: http://localhost:8081
          predicates:
            - Path=/user/user/login
          filters:
            - name: RequestRateLimiter
              args:
                # 允许每秒最多3次请求，但可容忍短时5次突发（例如瞬间点击），超过则返回 HTTP 429。
                redis-rate-limiter.replenishRate: 3
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@authKeyResolver}"
        - id: user-route
          uri: http://localhost:8081
          predicates:
            - Path=/user/**
        - id: admin-route
          uri: http://localhost:8081
          predicates:
            - Path=/admin/**
        # swagger-ui路由
        - id: swagger-ui
          uri: http://localhost:8081
          predicates:
            - Path=/doc.html,/swagger-ui/**,/webjars/**,/v3/api-docs/**
  data:
    redis:
      host: ${smart.redis.host}
      port: ${smart.redis.port}
      password: ${smart.redis.password}
      database: ${smart.redis.database}

smart:
  jwt:
    admin-secret-key-origin: "${random.value}"
    admin-ttl: 7200000
    admin-token-name: token
    user-secret-key-origin: "${random.value}"
    user-ttl: 7200000
    user-token-name: Authorization